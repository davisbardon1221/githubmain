<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support</title>
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/fr3ndYvd7.js"></script>
    <script src="js/custom.js"></script>
    <script src="js/cldu2gBTsv.js"></script>
    <link rel="stylesheet" href="css/custom.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        #background-video {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            min-width: 100%;
            min-height: 100%;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: -1;
        }
        
        #hello-text {
            position: fixed;
            top: 55%;
            left: 59%;
            transform: translate(-50%, -50%);
            color: #525252;
            font-size: 20px;
            font-weight: 600;
            z-index: 1;
            text-align: center;
            font-family: 'arial';
        }
        
        #footer-text {
            position: fixed;
            bottom: 5.5%;
            left: 65.5%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 20px;
            font-weight: 500;
            z-index: 1;
            text-align: center;
            font-family: 'arial';
        }
    </style>
</head>
<body>
    <video id="background-video" autoplay muted loop playsinline>
        <source src="mac.mp4" type="video/mp4">
    </video>
    <div id="hello-text" class="t-f-n-w"></div>
    <div id="footer-text" class="t-f-n-w"></div>
</body>
</html>
